name: Publish to Open VSX

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version increment (semver)
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: publish-openvsx
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Bump version
        id: bump
        run: |
          npm version ${{ inputs.version_bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to v$VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish --no-dependencies -p "$OVSX_PAT"

      - name: Package VSIX for GitHub Release
        run: npx @vscode/vsce package --no-dependencies

      - name: Commit version bump and tag
        working-directory: ${{ github.workspace }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add extension/package.json extension/package-lock.json
          git commit -m "chore(extension): release v${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: KAgent v${{ steps.bump.outputs.version }}
          generate_release_notes: true
          files: extension/kagent-${{ steps.bump.outputs.version }}.vsix
